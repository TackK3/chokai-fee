name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "v__VERSION__"
          releaseBody: "町会費徴収名簿 v__VERSION__ をリリースしました。"
          releaseDraft: false
          prerelease: false

      - name: Generate latest.json
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"

          # Get the signature from local build
          SIG_FILE=$(find src-tauri/target/release/bundle/nsis -name "*.exe.sig" | head -1)
          if [ -z "$SIG_FILE" ]; then
            echo "ERROR: No .exe.sig file found"
            find src-tauri/target/release/bundle/nsis -type f
            exit 1
          fi
          SIGNATURE=$(cat "$SIG_FILE")
          echo "Found sig: $SIG_FILE"

          # Get actual asset name from release via gh CLI
          # (tauri-action strips non-ASCII chars from filenames on Windows)
          EXE_NAME=$(gh release view "${TAG}" --json assets --jq '.assets[].name' | grep '_x64-setup\.exe$' | head -1)
          if [ -z "$EXE_NAME" ]; then
            echo "ERROR: setup exe not found in release"
            gh release view "${TAG}" --json assets --jq '.assets[].name'
            exit 1
          fi
          echo "Found asset: $EXE_NAME"

          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${EXE_NAME}"

          # Create latest.json
          printf '{\n  "version": "%s",\n  "notes": "町会費徴収名簿 v%s をリリースしました。",\n  "pub_date": "%s",\n  "platforms": {\n    "windows-x86_64": {\n      "signature": "%s",\n      "url": "%s"\n    }\n  }\n}\n' \
            "${VERSION}" "${VERSION}" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "${SIGNATURE}" "${DOWNLOAD_URL}" > latest.json

          echo "Generated latest.json:"
          cat latest.json

          gh release upload "${TAG}" latest.json --clobber
