name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "v__VERSION__"
          releaseBody: "町会費徴収名簿 v__VERSION__ をリリースしました。"
          releaseDraft: false
          prerelease: false

      - name: Generate latest.json
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"

          # Get the signature content from local build
          SIG_FILE=$(find src-tauri/target/release/bundle/nsis -name "*.exe.sig" | head -1)
          if [ -z "$SIG_FILE" ]; then
            echo "ERROR: No .exe.sig file found in build output"
            find src-tauri/target/release/bundle/nsis -type f
            exit 1
          fi
          SIGNATURE=$(cat "$SIG_FILE")
          echo "Found sig file: $SIG_FILE"

          # Query GitHub API to get the actual uploaded asset name
          # (tauri-action may strip non-ASCII characters from filenames)
          EXE_NAME=$(curl -sL -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}" | \
            python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for asset in data.get('assets', []):
              name = asset['name']
              if name.endswith('_x64-setup.exe') and not name.endswith('.sig'):
                  print(name)
                  break
          ")

          if [ -z "$EXE_NAME" ]; then
            echo "ERROR: Could not find setup exe in release assets"
            curl -sL -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}" | \
              python3 -c "import sys,json; [print(a['name']) for a in json.load(sys.stdin).get('assets',[])]"
            exit 1
          fi
          echo "Found asset: $EXE_NAME"

          ENCODED_NAME=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${EXE_NAME}'))")
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${ENCODED_NAME}"

          # Create latest.json using Python for proper JSON escaping
          python3 -c "
          import json, sys
          data = {
              'version': sys.argv[1],
              'notes': f'町会費徴収名簿 v{sys.argv[1]} をリリースしました。',
              'pub_date': sys.argv[2],
              'platforms': {
                  'windows-x86_64': {
                      'signature': sys.argv[3],
                      'url': sys.argv[4]
                  }
              }
          }
          with open('latest.json', 'w') as f:
              json.dump(data, f, indent=2, ensure_ascii=False)
          " "$VERSION" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$SIGNATURE" "$DOWNLOAD_URL"

          echo "Generated latest.json:"
          cat latest.json

          # Upload latest.json to the release
          gh release upload "${TAG}" latest.json --clobber
